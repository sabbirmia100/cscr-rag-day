<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — Rag Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/admin.css" />
</head>

<body class="login-page">
    <div class="login-bg">
        <div class="login-blob blob-1"></div>
        <div class="login-blob blob-2"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">🛡️</div>
            <h1 class="login-title">Admin Portal</h1>
            <p class="login-subtitle">Rag Day Registration System</p>

            <div id="loginAlert" class="alert hidden"></div>

            <form id="loginForm" novalidate>
                <div class="l-form-group">
                    <label for="username">Username</label>
                    <div class="l-input-wrap">
                        <span class="l-icon">👤</span>
                        <input type="text" id="username" name="username" placeholder="Enter username" required
                            autocomplete="username" />
                    </div>
                </div>

                <div class="l-form-group">
                    <label for="password">Password</label>
                    <div class="l-input-wrap">
                        <span class="l-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="Enter password" required
                            autocomplete="current-password" />
                        <button type="button" class="toggle-pass" id="togglePass"
                            title="Show/hide password">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">Login to Dashboard</span>
                    <span class="btn-spinner hidden">
                        <span class="spinner-ring"></span>
                    </span>
                </button>
            </form>

            <p class="login-footer">Protected area — authorized personnel only</p>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>

</html>
